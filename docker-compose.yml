version: '3.9'

services:
  rasa:
    image: rasa/rasa:3.6.2
    container_name: rasa
    ports:
      - "5005:5005"
    volumes:
      - ./rasa:/app
    # REMOVE 'rasa' from the beginning here:
    command: run --enable-api --cors "*" --debug --port 5005
    depends_on:
      - rasa_actions

  rasa_actions:
    build:
      context: ./rasa/actions
      dockerfile: Dockerfile
    container_name: actions
    ports:
      - "5055:5055"
    volumes:
      - ./rasa/actions:/app/actions
    environment:
      - PYTHONUNBUFFERED=1

  # NOTE: The 'backend' and 'rag' services are intended to run on Kaggle/Colab to leverage T4 GPUs.
  # If you choose to run 'backend' locally, ensure you have an NVIDIA GPU and enough VRAM.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    depends_on:
      - rasa